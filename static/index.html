<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stochverse</title>
<!--__ANALYTICS__-->
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#000;--bg2:#0a0a0a;--bg3:#111;--border:#1a1a1a;--green:#00ff00;--green-dim:#00aa00;--green-line:#0a3f0a;--green-bg:#001500;--red:#ff3333;--text:#fff;--text-dim:#888;--text-muted:#444}
html,body{background:var(--bg);color:var(--text);font-family:Helvetica,Arial,sans-serif}
:root{--header-h:110px}
#header{position:fixed;top:0;left:0;right:0;z-index:100;background:#000;border-bottom:1px solid var(--border);padding:12px 24px 0}
/* Fixed black band below the header that preserves the breathing
   room between the main app header and sticky elements like the
   screener filter sidebar and sortable table header. Content
   scrolling upward slides invisibly behind this curtain. */
#header::after{content:"";position:fixed;top:var(--header-h);left:0;right:0;height:16px;background:#000;z-index:99;pointer-events:none}
html,body{overscroll-behavior:none}
@media (max-width:900px){:root{--header-h:100px}}
@media (max-width:600px){:root{--header-h:90px}}
#logo{font-size:1.6rem;font-weight:900;color:var(--green);white-space:nowrap;flex-shrink:0}
#controls{display:flex;gap:12px;align-items:center;padding-bottom:12px}
#search-input{flex:1;min-width:0;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:6px;font-size:13px;outline:none;font-family:inherit}
#search-input:focus{border-color:var(--green)}
#search-input::placeholder{color:var(--text-muted)}
#date-sel{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:13px;font-family:inherit;outline:none;cursor:pointer}
#sort-sel{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:13px;font-family:inherit;outline:none;cursor:pointer}
.control-group{display:flex;flex-direction:column;align-items:center;gap:2px}
.control-label{font-size:9px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:#fff}
.btn-pair{display:flex;gap:0;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.pair-btn{background:var(--bg2);border:none;color:var(--text-dim);padding:5px 10px;font-size:11px;font-family:inherit;cursor:pointer;transition:background 0.12s,color 0.12s}
.pair-btn:not(:last-child){border-right:1px solid var(--border)}
.pair-btn:hover{color:var(--text)}
.pair-btn.active{background:var(--green);color:#000;font-weight:700}
#cat-tabs{display:flex;gap:0;border-bottom:1px solid var(--green-line);overflow-x:auto;scrollbar-width:none}
#cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{padding:10px 18px;font-size:15px;font-weight:600;color:var(--text);cursor:pointer;border:none;background:transparent;font-family:inherit;white-space:nowrap;border-bottom:2px solid transparent;transition:color 0.2s;margin-bottom:-1px}
.cat-tab:hover{color:var(--green)}
.cat-tab.active{color:var(--green);background:var(--green-bg);border-radius:6px 6px 0 0;border-bottom:2px solid var(--green)}
#main{display:flex;min-height:100vh;margin-top:110px}
#nav{width:200px;min-width:200px;padding:12px 8px;position:sticky;top:calc(var(--header-h) + 16px);height:calc(100vh - var(--header-h) - 16px);overflow-y:auto;border-right:1px solid var(--border);scrollbar-width:thin;scrollbar-color:var(--border) transparent;display:none;flex-shrink:0}
.nav-item{display:block;width:100%;background:transparent;border:none;color:var(--text);font-family:inherit;font-size:13px;text-align:left;padding:5px 6px;cursor:pointer;border-radius:4px;line-height:1.4}
.nav-item:hover{color:var(--text-dim)}
.nav-item.active{color:var(--green);font-weight:700}
.nav-child{display:block;width:100%;background:transparent;border:none;color:var(--text-muted);font-family:inherit;font-size:12px;text-align:left;padding:3px 6px 3px 18px;cursor:pointer;border-radius:4px;line-height:1.4}
.nav-child:hover{color:var(--text-dim)}
.nav-child.active{color:var(--green);font-weight:600}
#content{flex:1;padding:20px 20px;min-width:0}
#cards-grid{display:none;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
#cards-grid.list-view{grid-template-columns:1fr;gap:14px;max-width:600px}
/* control-group styles handle the view and layout button pairs */
.market-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:8px;min-width:0;overflow:hidden}
.market-card:hover{border-color:#333}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;flex-wrap:wrap;min-width:0}
.card-live-row{margin:4px 0 2px}
.card-series-row{margin:2px 0}
.agg-pill{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:800;color:var(--green);text-transform:uppercase;letter-spacing:0.6px;background:rgba(0,200,83,0.08);border:1px solid rgba(0,200,83,0.35);padding:2px 6px;border-radius:4px}
.agg-pill .agg-num{color:var(--text);font-weight:900;letter-spacing:0.3px}
.card-pills{display:flex;flex-direction:column;gap:2px}
.cat-pill{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--text)}
.subcat-pill{font-size:11px;color:#888;letter-spacing:0.3px}
.sub-pill{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;color:#888;border-left:1px solid #333;padding-left:6px}
.card-date{font-size:11px;color:var(--text-muted);white-space:nowrap}
.cat-icon{font-size:14px;line-height:1}
.card-title{font-size:13px;font-weight:600;line-height:1.4;color:var(--text)}
.card-ticker a{font-size:10px;color:var(--text-muted);text-decoration:none;font-family:monospace}
.card-ticker a:hover{color:var(--green)}
.card-ticker span{font-size:10px;color:var(--text-muted);font-family:monospace}
.tennis-score{display:flex;flex-direction:column;gap:4px;padding:6px 0 4px;border-top:1px solid var(--border);margin-top:4px}
.tennis-row{display:flex;align-items:center;gap:6px;font-size:12px}
.tennis-row .tn-name{flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tennis-row .tn-sets{color:var(--text-dim);font-weight:700;font-size:11px;margin-left:4px}
.tennis-row .tn-serve{width:10px;display:inline-block;text-align:center;color:var(--green);font-size:10px}
.tennis-row .tn-box{min-width:26px;padding:3px 7px;border:1px solid var(--border);border-radius:4px;background:var(--bg3);text-align:center;font-size:11px;font-weight:700;color:var(--text)}
.tennis-row .tn-history{display:flex;gap:3px}
.tennis-row .tn-history .tn-box{background:transparent;color:var(--text-dim);border-color:transparent;padding:3px 4px;min-width:18px}
/* Tab strip shown at the top of cards with multiple market groups
   (La Liga moneyline + spread + total + BTTS + 1H collapsed into
   one card by the backend). Only the active tab's outcome table
   is visible; switching is pure CSS via .market-group.active. */
.market-tabs{display:flex;gap:4px;flex-wrap:wrap;margin:8px 0 0;padding:0;border-bottom:1px solid var(--border)}
.market-tab{padding:5px 10px;background:transparent;border:0;border-bottom:2px solid transparent;color:var(--text-muted);font-family:inherit;font-size:10px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;cursor:pointer;transition:color 0.12s,border-color 0.12s}
.market-tab:hover{color:var(--text-dim)}
.market-tab.active{color:var(--text);border-bottom-color:var(--green)}
.market-group{display:none}
.market-group.active{display:block}
.outcome-header{display:flex;align-items:center;gap:6px;padding:6px 0 2px}
.outcome-header .outcome-label{flex:1}
.header-chance{flex:0 0 58px;text-align:center;font-size:8px;font-weight:700;letter-spacing:0.4px;color:var(--text-muted);text-transform:uppercase}
.header-odds{display:flex;gap:4px;flex-shrink:0}
.header-odds-box{width:44px;padding:0;font-size:8px;font-weight:700;letter-spacing:0.5px;text-align:center;text-transform:uppercase}
.header-yes{color:var(--green-dim)}
.header-no{color:var(--red)}
.outcome-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-top:1px solid var(--border)}
.market-card .outcome-row-extra{display:none}
.market-card.expanded .outcome-row-extra{display:flex}
.outcome-expand-btn{margin-top:6px;padding:6px 10px;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--text-dim);font-family:inherit;font-size:11px;cursor:pointer;width:100%;text-align:center;transition:color 0.15s,border-color 0.15s}
.outcome-expand-btn:hover{color:var(--text);border-color:var(--text-muted)}
.outcome-label{flex:1;font-size:11px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.outcome-score{flex:0 0 32px;text-align:center;font-size:13px;font-weight:700;color:var(--text)}
.header-score{flex:0 0 32px;text-align:center;font-size:8px;font-weight:700;letter-spacing:0.4px;color:var(--text-muted);text-transform:uppercase}
.outcome-chance{flex:0 0 58px;text-align:center;font-size:11px;color:var(--text-dim);border-radius:4px}
.outcome-odds{display:flex;gap:4px;flex-shrink:0}
.odds-box{padding:4px 0;border-radius:4px;width:44px;text-align:center;font-size:11px;font-weight:700}
.odds-yes{background:#001a00;border:1px solid #003300;color:var(--green)}
.odds-no{background:#1a0000;border:1px solid #330000;color:var(--red)}
#home-screen{display:flex;flex-direction:column;gap:28px;padding:30px 20px;max-width:1100px;margin:0 auto;width:100%}
#home-hero{text-align:center}
#home-hero h2{font-size:1.6rem;color:var(--green);font-weight:700;margin-bottom:8px}
#home-hero p{font-size:14px;color:var(--text-muted)}
#movers-section{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px}
#movers-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px;flex-wrap:wrap}
#movers-header h3{font-size:13px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--text)}
#movers-tabs{display:flex;gap:4px}
.movers-tab{padding:5px 11px;background:transparent;border:1px solid var(--border);color:var(--text-muted);font-family:inherit;font-size:10px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;cursor:pointer;border-radius:5px;transition:color 0.12s,border-color 0.12s}
.movers-tab:hover{color:var(--text-dim)}
.movers-tab.active{color:var(--text);border-color:var(--text-dim)}
#movers-list{display:flex;flex-direction:column;gap:4px}
.movers-empty{color:var(--text-muted);font-size:12px;padding:24px;text-align:center}
.mover-row{display:grid;grid-template-columns:auto 1fr auto auto;gap:12px;align-items:center;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color 0.12s}
.mover-row:hover{border-color:var(--text-muted)}
.mover-icon{font-size:18px;line-height:1;width:22px;text-align:center}
.mover-info{min-width:0}
.mover-title{font-size:12px;color:var(--text);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mover-label{font-size:11px;color:var(--text-muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mover-prob{font-size:15px;color:var(--text);font-weight:800;font-variant-numeric:tabular-nums;min-width:44px;text-align:right}
.mover-change{font-size:11px;font-weight:800;letter-spacing:0.3px;padding:4px 8px;border-radius:5px;min-width:58px;text-align:center;font-variant-numeric:tabular-nums}
.mover-change.up{background:rgba(0,200,83,0.12);color:#4caf50;border:1px solid rgba(0,200,83,0.3)}
.mover-change.down{background:rgba(244,67,54,0.12);color:#f44336;border:1px solid rgba(244,67,54,0.3)}
@media(max-width:600px){
  #home-screen{padding:16px 12px;gap:18px}
  #home-hero h2{font-size:1.3rem}
  #movers-section{padding:14px}
  .mover-row{grid-template-columns:auto 1fr auto;gap:8px;padding:10px}
  .mover-icon{font-size:16px;width:18px}
  .mover-prob{display:none}
  .mover-title{font-size:11px}
  .mover-label{font-size:10px}
}
#loader{display:none;justify-content:center;padding:20px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#sentinel{height:40px}
#count-bar{text-align:center;font-size:11px;color:var(--text-muted);padding:8px 0}
@keyframes flash-up-bg{0%{background-color:rgba(0,255,0,0.55)}100%{background-color:transparent}}
@keyframes flash-down-bg{0%{background-color:rgba(255,51,51,0.55)}100%{background-color:transparent}}
@keyframes flash-up-box{0%{box-shadow:0 0 14px 2px rgba(0,255,0,0.9)}100%{box-shadow:none}}
@keyframes flash-down-box{0%{box-shadow:0 0 14px 2px rgba(255,51,51,0.9)}100%{box-shadow:none}}
.outcome-chance.flash-up{animation:flash-up-bg 0.9s ease-out;border-radius:3px}
.outcome-chance.flash-down{animation:flash-down-bg 0.9s ease-out;border-radius:3px}
.odds-box.flash-up{animation:flash-up-box 0.9s ease-out}
.odds-box.flash-down{animation:flash-down-box 0.9s ease-out}
.card-time-slot{display:inline-flex;align-items:center;min-width:0;max-width:100%;flex-shrink:1}
.live-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:0.8px;max-width:100%;min-width:0}
.live-badge .live-text{white-space:normal;overflow-wrap:anywhere;word-break:break-word}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 6px rgba(255,51,51,0.9);animation:live-pulse 1.2s infinite ease-in-out}
.final-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.8px}
.final-score{color:var(--text);font-weight:700;letter-spacing:0.3px}
@keyframes live-pulse{0%,55%{opacity:1;transform:scale(1)}65%,100%{opacity:0.25;transform:scale(0.85)}}
.cat-tab-live{color:var(--red) !important}
.cat-tab-live:hover{color:var(--red) !important}
.cat-tab-live.active{color:var(--red) !important;background:rgba(255,51,51,0.1);border-bottom-color:var(--red) !important}
.cat-tab-live::before{content:"";display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--red);margin-right:7px;box-shadow:0 0 6px rgba(255,51,51,0.9);animation:live-pulse 1.2s infinite ease-in-out;vertical-align:middle}

/* ── Tablet / small desktop ─────────────────────────────────────────── */
@media (max-width: 900px) {
  #header{padding:10px 16px 0}
  #controls{flex-wrap:wrap;gap:8px}
  #logo{font-size:1.4rem;order:1}
  .control-group{order:2}
  .control-label{font-size:8px}
  .pair-btn{padding:4px 8px;font-size:10px}
  #search-input{order:3;flex:1 1 100%;min-width:0}
  #date-sel{order:4}
  #sort-sel{order:5}
  #custom-dates{order:6;flex:1 1 100%}
  #main{margin-top:155px}
  #nav{top:150px;height:calc(100vh - 150px);width:170px;min-width:170px}
  #content{padding:14px}
  #cards-grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
}

/* ── Phone ──────────────────────────────────────────────────────────── */
@media (max-width: 600px) {
  /* On phone, header is in normal flow (NOT position:fixed) so the
     iOS rubber-band bounce doesn't detach it from the nav. Everything
     scrolls together as one page. */
  #header{position:static;padding:8px 12px 0}
  /* Curtain was only useful when #header was fixed. */
  #header::after{display:none}
  #logo{font-size:1.2rem;order:1;flex:0 0 auto}
  #controls{gap:6px;padding-bottom:8px}
  /* Row 1: Logo + Search. Row 2: Date + Sort + Market View + Grid/List. */
  .control-label{display:none}
  .pair-btn{padding:4px 7px;font-size:10px}
  #controls{flex-wrap:wrap;gap:6px;padding-bottom:6px}
  #logo{order:1;flex:0 0 auto}
  #search-input{order:2;flex:1 1 auto;min-width:0;font-size:13px;padding:7px 12px}
  #date-sel{order:3;flex:0 0 auto;min-width:0;font-size:11px;padding:6px 8px}
  #sort-sel{order:4;flex:0 0 auto;min-width:0;font-size:11px;padding:6px 8px}
  .control-group{display:flex;order:5;gap:1px}
  .control-group:last-child{order:6}
  /* Force row break after search */
  #search-input{flex-basis:calc(100% - 80px)}
  /* No row break between date/sort/toggles — all on row 2 */
  .cat-tab{padding:8px 12px;font-size:13px}
  /* Header is in normal flow now, so #main doesn't need a margin to
     clear a fixed header. */
  #main{margin-top:0;display:block}
  /* Sidebar on phone becomes a horizontal scroll strip that sticks
     just below the fixed header when the user scrolls. Opaque
     background + z-index above the screener sticky thead. */
  /* Use flex when visible so pills always size the nav correctly.
     display:none toggled via JS overrides display:flex when hidden. */
  #nav{position:relative;z-index:25;width:auto;min-width:0;min-height:44px;height:auto;max-height:none;border-right:none;border-bottom:1px solid var(--border);padding:8px 12px;display:none;align-items:center;gap:6px;flex-wrap:nowrap;overflow-x:auto;overflow-y:visible;white-space:nowrap;scrollbar-width:none}
  /* Override any inline display:block JS sets to keep flex layout. */
  #nav[style*="display: block"]{display:flex !important}
  #nav::-webkit-scrollbar{display:none}
  #nav .nav-item{display:inline-block;width:auto;padding:6px 10px;margin-right:4px;font-size:12px;border:1px solid var(--border);border-radius:16px}
  #nav .nav-item.active{border-color:var(--green);background:rgba(0,170,0,0.1)}
  #nav .nav-child{display:inline-block;width:auto;padding:5px 10px 5px 10px;margin-right:4px;font-size:11px;border:1px solid var(--border);border-radius:14px}
  #nav .nav-child.active{border-color:var(--green);background:rgba(0,170,0,0.1)}
  #content{padding:10px}
  #cards-grid{grid-template-columns:1fr;gap:10px}
  .market-card{padding:12px}
  .card-title{font-size:13px}
  .outcome-label{font-size:11px}
  .outcome-chance{flex:0 0 52px;font-size:11px}
  .odds-box{padding:4px 0;width:38px;font-size:11px}
  .header-chance{flex:0 0 52px}
  .header-odds-box{padding:0;width:38px}
  .live-badge{font-size:10px;letter-spacing:0.5px}
  .final-badge{font-size:10px;letter-spacing:0.5px}
}

/* ── Small phone ────────────────────────────────────────────────────── */
@media (max-width: 380px) {
  #logo{font-size:1.1rem}
  #date-sel,#sort-sel{flex:1}
  .cat-tab{padding:7px 10px;font-size:12px}
  .outcome-chance{flex:0 0 46px}
  .odds-box{width:34px;padding:4px 0}
  .header-chance{flex:0 0 46px}
  .header-odds-box{width:34px;padding:0}
}
/* ── Screener ─────────────────────────────────────────────── */
/* v2: bounded scroll container so sticky thead sticks reliably */
#screener{display:flex;gap:16px;padding:12px 16px}
#screener-filters{flex:0 0 220px;background:var(--bg2);border-radius:8px;padding:14px;border:1px solid var(--border);position:sticky;top:calc(var(--header-h) + 16px);align-self:flex-start;max-height:calc(100vh - var(--header-h) - 36px);overflow-y:auto;scrollbar-width:none}
#screener-filters::-webkit-scrollbar{display:none}
#screener-filters h3{margin:0 0 12px;font-size:13px;color:var(--text);letter-spacing:0.5px;text-transform:uppercase}
.sf-group{margin-bottom:12px}
.sf-group label{display:block;font-size:10px;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.3px}
.sf-group select,.sf-group input{width:100%;padding:6px 8px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;font-family:inherit;box-sizing:border-box}
.sf-range{display:flex;align-items:center;gap:6px}
.sf-range input{width:45%}
.sf-range span{color:var(--text-muted);font-size:11px}
.sf-btn{width:100%;padding:8px;margin-top:6px;border:1px solid var(--green);background:transparent;color:var(--green);border-radius:5px;font-size:12px;cursor:pointer;font-family:inherit;transition:background 0.15s}
.sf-btn:hover{background:rgba(0,255,100,0.08)}
.sf-btn-dim{border-color:var(--border);color:var(--text-muted)}
.sf-btn-dim:hover{color:var(--text);border-color:var(--text-muted);background:transparent}
#screener-table-wrap{flex:1;min-width:0}
#screener-count{font-size:11px;color:var(--text-muted);margin:8px 0;text-align:left;padding:6px 4px;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
#screener-table{width:100%;border-collapse:separate;border-spacing:0;font-size:11px}

<script>
var state = {
  category: null, sport: null, soccerComp: null,
  search: "", dateFilter: "all", dateFrom: "", dateTo: "",
  sort: "earliest", layout: "grid", viewMode: "all",
  offset: 0, total: 0, loading: false, allLoaded: false,
  categories: [], sports: [], soccerComps: [],
  liveSports: [], liveSportSubtabs: {}, liveCategories: []
};

async function loadLiveSports() {
  try {
    var r = await fetch("/api/sports?live=true");
    var d = await r.json();
    state.liveSports = d.sports || [];
    state.liveCategories = d.live_categories || [];
    state.liveSportSubtabs = {};
    for (var i = 0; i < state.liveSports.length; i++) {
      state.liveSportSubtabs[state.liveSports[i].name] = state.liveSports[i].subtabs || [];
    }
  } catch (e) { console.error("loadLiveSports error", e); }
}

var SPORT_EMOJI = {
  "Soccer": "⚽", "Basketball": "🏀", "Baseball": "⚾", "Football": "🏈",
  "Hockey": "🏒", "Tennis": "🎾", "Golf": "⛳", "MMA": "🥊",
  "Cricket": "🏏", "Esports": "🎮", "Motorsport": "🏎", "Boxing": "🥊",
  "Rugby": "🏉", "Lacrosse": "🥍", "Chess": "♟", "Darts": "🎯",
  "Aussie Rules": "🏉", "Other Sports": "🏆"
};
var CAT_EMOJI = {
  "Sports": "🏟", "Elections": "🗳", "Politics": "🏛", "Economics": "📈",
  "Financials": "💰", "Crypto": "₿", "Companies": "🏢", "Entertainment": "🎬",
  "Climate and Weather": "🌍", "Science and Technology": "🔬",
  "Health": "🏥", "Social": "👥", "World": "🌐", "Transportation": "✈", "Mentions": "💬"
};

// ── Movers (home-screen "Biggest 24h Movers" section) ──────────────
// Pulls /api/movers and renders a compact list. Each row links to
// the event detail page via showEventDetail. Re-renders on tab
// switch (All / Risers / Fallers). Refreshes every 60s while the
// home screen is visible so fresh moves surface without reload.
var moversState = { dir: "both", loading: false, data: [] };

async function loadMovers() {
  if (moversState.loading) return;
  moversState.loading = true;
  try {
    var r = await fetch("/api/movers?direction=" + moversState.dir + "&limit=12");
    var d = await r.json();
    moversState.data = d.movers || [];
    renderMovers();
  } catch (e) {
    console.error("loadMovers error", e);
    document.getElementById("movers-list").innerHTML =
      '<div class="movers-empty">Failed to load. Try again shortly.</div>';
  } finally {
    moversState.loading = false;
  }
}

function renderMovers() {
  var list = document.getElementById("movers-list");
  if (!list) return;
  var rows = moversState.data;
  if (!rows.length) {
    list.innerHTML = '<div class="movers-empty">No significant movers right now.</div>';
    return;
  }
  var h = "";
  for (var i = 0; i < rows.length; i++) {
    var m = rows[i];
    var icon = m.sport ? (SPORT_EMOJI[m.sport] || CAT_EMOJI[m.category] || "")
                       : (CAT_EMOJI[m.category] || "");
    var chg = m.change;
    var chgCls = chg > 0 ? "up" : "down";
    var chgText = (chg > 0 ? "+" : "") + chg + "pp";
    h += '<div class="mover-row" data-ticker="' + escH(m.event_ticker) + '">';
    h += '<div class="mover-icon">' + escH(icon) + '</div>';
    h += '<div class="mover-info">';
    h += '<div class="mover-title">' + escH(m.title) + '</div>';
    h += '<div class="mover-label">' + escH(m.label) + '</div>';
    h += '</div>';
    h += '<div class="mover-prob">' + m.prob + '%</div>';
    h += '<div class="mover-change ' + chgCls + '">' + chgText + '</div>';
    h += '</div>';
  }
  list.innerHTML = h;
  // Wire click-through to the detail page.
  var nodes = list.querySelectorAll(".mover-row");
  for (var j = 0; j < nodes.length; j++) {
    nodes[j].addEventListener("click", function() {
      var tkr = this.getAttribute("data-ticker");
      if (tkr) showEventDetail(tkr);
    });
  }
}

// Auto-refresh movers every 60s while the home screen is visible.
// Skipped on category/detail views so we don't hit /api/movers
// needlessly when the section isn't on screen.
setInterval(function() {
  var homeVis = document.getElementById("home-screen");
  if (homeVis && homeVis.style.display !== "none") loadMovers();
}, 60000);

// Tab handlers — All / Risers / Fallers.
document.addEventListener("DOMContentLoaded", function() {
  var tabs = document.querySelectorAll(".movers-tab");
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].addEventListener("click", function() {
      for (var j = 0; j < tabs.length; j++) tabs[j].classList.remove("active");
      this.classList.add("active");
      moversState.dir = this.getAttribute("data-dir");
      loadMovers();
    });
  }
});

async function boot() {
  try {
    // Step 1: Load static metadata instantly (no data fetch needed)
    var rm = await fetch("/api/meta");
    var dm = await rm.json();
    state.categories = dm.categories || [];
    state.sports = dm.sports || [];
    state.soccerComps = dm.soccer_comps || [];
    state.sportSubtabs = {};
    state.catSubtabs = {};
    for (var i = 0; i < state.sports.length; i++) {
      state.sportSubtabs[state.sports[i].name] = state.sports[i].subtabs || [];
    }
    for (var i = 0; i < state.categories.length; i++) {
      state.catSubtabs[state.categories[i].name] = state.categories[i].subtabs || [];
    }
    renderCatTabs();

    // Kick off the Movers section fetch in parallel with the rest
    // of boot — cheap endpoint, warms up Kalshi cache if cold.
    loadMovers();

    // Restore the full nav state from the URL so refresh, direct
    // deep-links, and back/forward all land the user back on the
    // exact view they were on — category, sport, soccer comp,
    // live subtab, and search are all URL-encoded.
    await restoreFromUrl(location.search);

    // Step 2: Load real counts — but ONLY if the user has actually
    // landed on (or deep-linked into) a category. On the home screen
    // there's nothing to populate counts for yet, so skipping this
    // keeps cold-start render instant. loadRealCounts() is invoked
    // lazily from selectCat() the first time a category is picked.
    if (state.category) {
      await loadRealCounts();
    }
  } catch(ex) { console.error("boot error", ex); }
}

// Pulls real category + sport counts from the backend. These calls
// hit get_data() which on a cold container waits for the full Kalshi
// snapshot — ~20-40s on the very first request. Deferred until we
// know the user cares about counts (i.e., they've picked a category
// or deep-linked into one).
var _countsLoaded = false;
var _countsLoading = null;
async function loadRealCounts() {
  if (_countsLoaded) return;
  if (_countsLoading) return _countsLoading;
  _countsLoading = (async function() {
    try {
      var r1 = await fetch("/api/categories");
      var d1 = await r1.json();
      state.categories = d1.categories || state.categories;
      var r2 = await fetch("/api/sports");
      var d2 = await r2.json();
      state.sports = d2.sports || state.sports;
      state.soccerComps = d2.soccer_comps || state.soccerComps;
      state.sportSubtabs = {};
      state.catSubtabs = {};
      for (var i = 0; i < state.sports.length; i++) {
        state.sportSubtabs[state.sports[i].name] = state.sports[i].subtabs || [];
      }
      for (var j = 0; j < state.categories.length; j++) {
        state.catSubtabs[state.categories[j].name] = state.categories[j].subtabs || [];
      }
      renderCatTabs();
      if (state.category) renderNav();
      _countsLoaded = true;
    } catch (ex) {
      console.error("loadRealCounts error", ex);
    } finally {
      _countsLoading = null;
    }
  })();
  return _countsLoading;
}

function renderCatTabs() {
  var el = document.getElementById("cat-tabs");
  el.innerHTML = "";

  var allKeys = [null, "All", "Live", "Screener"];
  var allLabels = ["", "All", "Live", "Screener"];
  for (var i = 0; i < state.categories.length; i++) {
    allKeys.push(state.categories[i].name);
    allLabels.push(state.categories[i].name);
  }

  for (var i = 0; i < allKeys.length; i++) {
    var btn = document.createElement("button");
    var cls = "cat-tab";
    if (state.category === allKeys[i]) cls += " active";
    if (allKeys[i] === "Live") cls += " cat-tab-live";
    btn.className = cls;
    btn.textContent = allLabels[i];
    (function(key) {
      btn.addEventListener("click", function() { selectCat(key); });
    })(allKeys[i]);
    el.appendChild(btn);
  }
}

// Encode the current nav state into a query string so the URL
// always reflects exactly what the user is looking at. Used as
// the source of truth for browser back/forward so all filters
// (category, sport, soccer comp, live subtab, search) are
// preserved — not just the top-level category.
function buildNavUrl() {
  var p = new URLSearchParams();
  if (state.category) p.set("cat", state.category);
  if (state.sport) p.set("sport", state.sport);
  if (state.soccerComp) p.set("comp", state.soccerComp);
  if (state._liveCat) p.set("live_cat", state._liveCat);
  if (state.search) p.set("search", state.search);
  var qs = p.toString();
  return qs ? ("?" + qs) : "/";
}
// Push (or replace) the current nav state onto the history stack.
// Call this after any state mutation that changes what the user
// sees — selectCat, selectSport, selectComp, search, etc.
function pushNavState(replace) {
  var url = buildNavUrl();
  var st = {
    nav: {
      category: state.category || null,
      sport: state.sport || null,
      soccerComp: state.soccerComp || null,
      liveCat: state._liveCat || null,
      search: state.search || "",
    },
  };
  if (replace) history.replaceState(st, "", url);
  else history.pushState(st, "", url);
}

// Apply the filter state encoded in a URL search string. Runs on
// initial page load and on every popstate (browser back/forward).
// Uses skipHistory=true throughout so we don't double-push the
// same URL onto the history stack during restoration.
async function restoreFromUrl(searchStr) {
  var params = new URLSearchParams(searchStr || "");
  var ev = params.get("event");
  if (ev) {
    showEventDetail(ev, true);
    return;
  }
  var cat = params.get("cat");
  var sp = params.get("sport");
  var comp = params.get("comp");
  var liveCat = params.get("live_cat");
  var search = params.get("search") || "";
  // Exit any lingering detail view.
  var ed = document.getElementById("event-detail");
  if (ed) { ed.style.display = "none"; ed.innerHTML = ""; }
  state._eventTicker = null;
  state._prevView = null;
  if (!cat && !sp && !search) {
    // No filters → home screen.
    state.category = null;
    state.sport = null;
    state.soccerComp = null;
    state._liveCat = null;
    state.search = "";
    document.getElementById("search-input").value = "";
    document.getElementById("home-screen").style.display = "flex";
    document.getElementById("cards-grid").style.display = "none";
    document.getElementById("screener").style.display = "none";
    document.getElementById("content").style.display = "";
    // Refresh movers whenever the home screen is re-shown — the
    // 60s auto-refresh might be minutes away from firing.
    loadMovers();
    document.getElementById("nav").style.display = "none";
    document.getElementById("count-bar").textContent = "";
    renderCatTabs();
    return;
  }
  if (search) {
    // Global search — mirrors the behavior of the search input box.
    state.category = "All";
    state.sport = null;
    state.soccerComp = null;
    state._liveCat = null;
    state.search = search;
    state.offset = 0;
    state.allLoaded = false;
    document.getElementById("search-input").value = search;
    document.getElementById("screener").style.display = "none";
    document.getElementById("content").style.display = "";
    document.getElementById("nav").style.display = "none";
    document.getElementById("home-screen").style.display = "none";
    document.getElementById("cards-grid").style.display = "grid";
    document.getElementById("cards-grid").innerHTML = "";
    renderCatTabs();
    loadMore();
    return;
  }
  // Category-based navigation. Build the full state in one pass
  // (instead of calling selectCat → selectSport → selectComp, each
  // of which would fire its own loadMore and race the others).
  state.category = cat;
  state.sport = sp || null;
  state.soccerComp = comp || null;
  state._liveCat = (cat === "Live" ? liveCat : null) || null;
  state.search = "";
  state.offset = 0;
  state.allLoaded = false;
  document.getElementById("search-input").value = "";
  // Show/hide views for screener vs cards.
  var isScreener = cat === "Screener";
  document.getElementById("content").style.display = isScreener ? "none" : "";
  document.getElementById("screener").style.display = isScreener ? "flex" : "none";
  if (isScreener) {
    document.getElementById("nav").style.display = "none";
    renderCatTabs();
    screenerInit();
    return;
  }
  // For the Live tab we need up-to-date live-only sport counts
  // before the sidebar renders properly.
  if (cat === "Live") {
    await loadLiveSports();
  }
  document.getElementById("home-screen").style.display = "none";
  document.getElementById("cards-grid").style.display = "grid";
  document.getElementById("cards-grid").innerHTML = "";
  document.getElementById("count-bar").textContent = "";
  renderCatTabs();
  renderNav();
  loadMore();
}

async function selectCat(key, skipHistory) {
  // Always exit the event-detail view when changing categories so
  // the previous overlay doesn't linger on top of the cards grid.
  var ed = document.getElementById("event-detail");
  if (ed) { ed.style.display = "none"; ed.innerHTML = ""; }
  state._eventTicker = null;
  state._prevView = null;
  // Lazy-load real counts on the first category pick. No-op once
  // already loaded; runs in parallel with the loadMore() call below.
  if (key !== null) loadRealCounts();
  state.category = key;
  state.sport = null;
  state.soccerComp = null;
  state._liveCat = null;
  state.search = "";
  state.offset = 0;
  state.allLoaded = false;
  document.getElementById("search-input").value = "";
  // Push URL state so browser back/forward works
  if (!skipHistory) pushNavState(false);
  renderCatTabs();
  if (key === "Live") {
    // Pull live-only sport counts before rendering the sidebar so it
    // reflects what's actually happening right now.
    await loadLiveSports();
  }
  renderNav();
  // Hide/show views based on selected tab
  var isScreener = key === "Screener";
  document.getElementById("content").style.display = isScreener ? "none" : "";
  document.getElementById("screener").style.display = isScreener ? "flex" : "none";
  if (isScreener) {
    document.getElementById("nav").style.display = "none";
    screenerInit();
    return;
  }
  if (key === null) {
    document.getElementById("home-screen").style.display = "flex";
    document.getElementById("cards-grid").style.display = "none";
    document.getElementById("nav").style.display = "none";
    document.getElementById("count-bar").textContent = "";
    loadMovers();
    return;
  }
  document.getElementById("home-screen").style.display = "none";
  document.getElementById("cards-grid").style.display = "grid";
  document.getElementById("cards-grid").innerHTML = "";
  document.getElementById("count-bar").textContent = "";
  loadMore();
}

function renderNav() {
  var nav = document.getElementById("nav");
  if (!state.category || state.category === "All" || state.search) { nav.style.display = "none"; return; }

  if (state.category === "Sports" || state.category === "Live") {
    var sportsList = state.category === "Live" ? (state.liveSports || []) : state.sports;
    var subtabsMap = state.category === "Live" ? (state.liveSportSubtabs || {}) : state.sportSubtabs;
    var liveCats = state.category === "Live" ? (state.liveCategories || []) : [];
    nav.style.display = "block";
    nav.innerHTML = "";
    var total = 0;
    for (var i = 0; i < sportsList.length; i++) total += sportsList[i].count;
    for (var lc = 0; lc < liveCats.length; lc++) total += liveCats[lc].count;
    var allBtn = document.createElement("button");
    allBtn.className = "nav-item" + (!state.sport && !state._liveCat ? " active" : "");
    allBtn.textContent = (state.category === "Live" ? "All live" : "All sports") + " (" + total + ")";
    allBtn.addEventListener("click", function() { state._liveCat = null; selectSport(null); });
    nav.appendChild(allBtn);
    for (var i = 0; i < sportsList.length; i++) {
      var s = sportsList[i];
      var isActive = state.sport === s.name;
      var btn = document.createElement("button");
      btn.className = "nav-item" + (isActive ? " active" : "");
      btn.textContent = s.name + " (" + s.count + ")" + (isActive ? " ▾" : " ▸");
      (function(name) { btn.addEventListener("click", function() { selectSport(name); }); })(s.name);
      nav.appendChild(btn);
      if (isActive) {
        var subtabs = (subtabsMap && subtabsMap[s.name]) || [];
        if (subtabs.length > 0) {
          var allComp = document.createElement("button");
          allComp.className = "nav-child" + (!state.soccerComp ? " active" : "");
          allComp.textContent = "All";
          allComp.addEventListener("click", function() { selectComp(null); });
          nav.appendChild(allComp);
          for (var j = 0; j < subtabs.length; j++) {
            var comp = subtabs[j];
            var cb = document.createElement("button");
            cb.className = "nav-child" + (state.soccerComp === comp ? " active" : "");
            cb.textContent = (state.soccerComp === comp ? "▸ " : "") + comp;
            (function(c) { cb.addEventListener("click", function() { selectComp(c); }); })(comp);
            nav.appendChild(cb);
          }
        }
      }
    }
    // Non-sport categories in the Live sidebar (Crypto, Climate, etc.)
    for (var lci = 0; lci < liveCats.length; lci++) {
      var lcat = liveCats[lci];
      var lcActive = state._liveCat === lcat.name;
      var lcBtn = document.createElement("button");
      lcBtn.className = "nav-item" + (lcActive ? " active" : "");
      lcBtn.textContent = lcat.name + " (" + lcat.count + ")";
      (function(catName) {
        lcBtn.addEventListener("click", function() {
          if (state._liveCat === catName) {
            state._liveCat = null;
          } else {
            state._liveCat = catName;
            state.sport = null;
            state.soccerComp = null;
          }
          state.offset = 0;
          state.allLoaded = false;
          pushNavState(false);
          document.getElementById("cards-grid").innerHTML = "";
          renderNav();
          loadMore();
        });
      })(lcat.name);
      nav.appendChild(lcBtn);
    }
  } else {
    var subtabs = (state.catSubtabs && state.catSubtabs[state.category]) || [];
    if (subtabs.length === 0) { nav.style.display = "none"; return; }
    nav.style.display = "block";
    nav.innerHTML = "";
    var allBtn = document.createElement("button");
    allBtn.className = "nav-item" + (!state.soccerComp ? " active" : "");
    allBtn.textContent = "All";
    allBtn.addEventListener("click", function() { selectComp(null); });
    nav.appendChild(allBtn);
    for (var i = 0; i < subtabs.length; i++) {
      var tag = subtabs[i];
      var isActive = state.soccerComp === tag;
      var btn = document.createElement("button");
      btn.className = "nav-item" + (isActive ? " active" : "");
      btn.textContent = (isActive ? "▸ " : "") + tag;
      (function(t) { btn.addEventListener("click", function() { selectComp(t); }); })(tag);
      nav.appendChild(btn);
    }
  }
}

function selectSport(name, skipHistory) {
  if (state.sport === name && name !== null) state.sport = null;
  else state.sport = name;
  state.soccerComp = null;
  state.offset = 0;
  state.allLoaded = false;
  if (state.category !== "Live") state.category = "Sports";
  if (!skipHistory) pushNavState(false);
  renderCatTabs();
  document.getElementById("home-screen").style.display = "none";
  document.getElementById("cards-grid").style.display = "grid";
  document.getElementById("cards-grid").innerHTML = "";
  renderNav();
  loadMore();
}

function selectComp(comp, skipHistory) {
  state.soccerComp = comp;
  state.offset = 0;
  state.allLoaded = false;
  if (!skipHistory) pushNavState(false);
  document.getElementById("cards-grid").innerHTML = "";
  renderNav();
  loadMore();
}

async function loadMore() {
  if (state.loading || state.allLoaded || state.category === null) return;
  state.loading = true;
  document.getElementById("loader").style.display = "flex";
  var url = "/api/events?offset=" + state.offset + "&limit=24&date_filter=" + state.dateFilter + "&sort=" + state.sort;
  if (state.dateFilter === "custom" && state.dateFrom) url += "&date_from=" + state.dateFrom;
  if (state.dateFilter === "custom" && state.dateTo) url += "&date_to=" + state.dateTo;
  if (state.category && state.category !== "All") url += "&category=" + encodeURIComponent(state.category);
  if (state.sport) url += "&sport=" + encodeURIComponent(state.sport);
  if (state.soccerComp) url += "&soccer_comp=" + encodeURIComponent(state.soccerComp);
  if (state._liveCat) url += "&live_cat=" + encodeURIComponent(state._liveCat);
  if (state.viewMode === "all") url += "&view=all";
  if (state.search) url += "&search=" + encodeURIComponent(state.search);
  try {
    var r = await fetch(url);
    var d = await r.json();
    state.total = d.total || 0;
    var evs = d.events || [];
    state.offset += evs.length;
    if (evs.length === 0 || state.offset >= state.total) state.allLoaded = true;
    appendCards(evs);
    updateCountBar();
  } catch(ex) { console.error("loadMore error", ex); }
  state.loading = false;
  document.getElementById("loader").style.display = "none";
}

function appendCards(evs) {
  var grid = document.getElementById("cards-grid");
  for (var i = 0; i < evs.length; i++) {
    var div = document.createElement("div");
    div.innerHTML = buildCard(evs[i]);
    var card = div.firstChild;
    if (!card) continue;
    // Click anywhere on the card → open the dedicated event page.
    // Ignore clicks on nested interactive elements (market-type tabs,
    // outcome expand button, Kalshi ticker link) so existing behaviors
    // still work. Also ignore middle-click / cmd+click so power users
    // can still open the Kalshi link in a new tab.
    card.addEventListener("click", function(ev) {
      if (ev.button !== 0 || ev.metaKey || ev.ctrlKey || ev.shiftKey) return;
      var t = ev.target;
      while (t && t !== this) {
        var tag = (t.tagName || "").toLowerCase();
        if (tag === "a" || tag === "button") return;
        t = t.parentNode;
      }
      var tkr = this.getAttribute("data-event-ticker");
      if (tkr) showEventDetail(tkr);
    });
    grid.appendChild(card);
  }
  // Subscribe all visible card tickers to WS for real-time updates.
  var cardTickers = document.querySelectorAll("[data-card-ticker]");
  var subList = [];
  for (var ct = 0; ct < cardTickers.length; ct++) {
    var t = cardTickers[ct].getAttribute("data-card-ticker");
    if (t) subList.push(t);
  }
  if (subList.length && typeof PriceStream !== "undefined") {
    PriceStream.subscribe(subList);
  }
}

function isLive(ev) {
  // If ESPN or SofaScore explicitly reported the game as in
  // progress or finished, trust that directly. This avoids bad
  // edge cases where our computed kickoff window (derived from
  // Kalshi's expected_expiration_time minus a per-sport DURATION
  // estimate) is off by an hour or two and hides a clearly-live
  // game behind a static kickoff timestamp.
  if (ev._live_state && ev._live_state.state === "in") return true;
  if (ev._live_state && ev._live_state.state === "post") return true;
  if (!ev._kickoff_dt || !ev._game_end_dt) return false;
  try {
    var now = Date.now();
    var k = new Date(ev._kickoff_dt).getTime();
    var g = new Date(ev._game_end_dt).getTime();
    // Add 2h buffer for matches that run longer than the estimated
    // DURATION (tennis 3-setters, soccer extra time, overtime, etc.)
    var buffer = 2 * 60 * 60 * 1000;
    return k <= now && now < (g + buffer);
  } catch (e) { return false; }
}

// Live game label shown next to the LIVE dot. Prefers ESPN-sourced
// data (covers NBA/NFL/MLB/NHL/major soccer) and falls back to a
// wall-clock soccer estimate for anything ESPN doesn't match.
function liveTimeLabel(ev) {
  if (ev._live_state && ev._live_state.label) return ev._live_state.label;
  if (ev._sport !== "Soccer" || !ev._kickoff_dt) return null;
  try {
    var k = new Date(ev._kickoff_dt).getTime();
    var mins = Math.floor((Date.now() - k) / 60000);
    if (mins < 0) return null;
    if (mins <= 45) return "1st " + Math.max(1, mins) + "'";
    if (mins <= 60) return "HT";
    if (mins <= 105) return "2nd " + (mins - 15) + "'";
    return null;
  } catch (e) { return null; }
}

function buildDateText(ev) {
  // Prefer the kickoff timestamp — ESPN/SofaScore override it with
  // the real scheduled start when they match, so it's authoritative.
  // _display_dt is only used as a fallback for events with no
  // kickoff_dt at all (rare, usually non-sport markets).
  if (ev._kickoff_dt) {
    try {
      var kd = new Date(ev._kickoff_dt);
      var dateOpts = {month: "short", day: "numeric", timeZone: "America/New_York"};
      var timeOpts = {hour: "numeric", minute: "2-digit", timeZone: "America/New_York", timeZoneName: "short"};
      return kd.toLocaleDateString("en-US", dateOpts) + ", " + kd.toLocaleTimeString("en-US", timeOpts);
    } catch (e) {}
  }
  return ev._display_dt || "";
}

// Score string to display on a live/final badge. The backend builds
// this in the same team order as the Kalshi event title so it lines
// up with the outcome labels in the card body.
function liveScoreString(live) {
  if (!live) return "";
  if (live.score_display) return live.score_display;
  // Legacy fallback in case an older cached record lacks score_display.
  var hs = live.home_score, as = live.away_score;
  if (hs === undefined || hs === null || hs === "" ||
      as === undefined || as === null || as === "") return "";
  var ha = live.home_abbr || "", aa = live.away_abbr || "";
  if (!ha && !aa) return as + " - " + hs;
  return (aa || "AWAY") + " " + as + " - " + (ha || "HOME") + " " + hs;
}

// Compact aggregate / series indicator for card view. Shows a
// single pill line like "AGG 3-2 · Leg 2/2" for soccer 2-leg
// ties, or "SERIES OKC 3-1" for NBA playoffs. Returns "" when
// the game isn't a playoff / knockout tie or we lack the data.
function renderSeriesPill(ev) {
  var live = ev && ev._live_state;
  if (!live) return "";
  if (live.is_two_leg) {
    var aggH = (typeof live.aggregate_home === "number") ? live.aggregate_home : null;
    var aggA = (typeof live.aggregate_away === "number") ? live.aggregate_away : null;
    var parts = [];
    if (aggH !== null && aggA !== null) {
      parts.push('<span class="agg-num">' + aggH + '\u2013' + aggA + '</span>');
    }
    if (live.leg_number) parts.push("Leg " + live.leg_number + "/2");
    if (parts.length === 0) return "";
    return '<span class="agg-pill" title="Aggregate across both legs">AGG ' + parts.join(' \u00B7 ') + '</span>';
  }
  if (live.is_playoff) {
    var hW = (typeof live.series_home_wins === "number") ? live.series_home_wins : null;
    var aW = (typeof live.series_away_wins === "number") ? live.series_away_wins : null;
    var gN = live.series_game_number;
    if (hW === null || aW === null) {
      if (live.series_summary) return '<span class="agg-pill">PLAYOFF \u00B7 ' + live.series_summary.toUpperCase() + '</span>';
      return "";
    }
    var leader = live.home_abbr || "HOME";
    var leadWins = hW, trailWins = aW;
    if (aW > hW) { leader = live.away_abbr || "AWAY"; leadWins = aW; trailWins = hW; }
    else if (aW === hW) { leader = "TIED"; }
    var tag = leader === "TIED" ? ("SERIES TIED " + hW + "\u2013" + aW)
                                : ("SERIES " + leader + " " + leadWins + "\u2013" + trailWins);
    if (gN) tag = "GAME " + gN + " \u00B7 " + tag;
    return '<span class="agg-pill">' + tag + '</span>';
  }
  return "";
}

function renderTimeSlot(ev) {
  if (isLive(ev)) {
    // ESPN says the game has already ended even though Kalshi's
    // market is still open for settlement — show FINAL instead of a
    // live clock, with the box score when we have it.
    var live = ev._live_state;
    if (live && live.state === "post") {
      var finalScore = liveScoreString(live);
      var score = finalScore ? ' \u00B7 <span class="final-score">' + finalScore + '</span>' : '';
      return '<span class="final-badge">FINAL' + score + '</span>';
    }
    var scoreStr = liveScoreString(live);
    var scorePart = scoreStr ? ' \u00B7 ' + scoreStr : '';
    var t = liveTimeLabel(ev);
    var clockPart = t ? ' \u00B7 ' + t : '';
    // Stash ESPN state on the badge so the 500ms tick loop can
    // interpolate the clock between backend refreshes. clock_running
    // tells us whether real play is ongoing — when it's false we
    // freeze the clock instead of counting it down through a
    // commercial / timeout.
    var attrs = '';
    if (live && live.display_clock && live.period && live.captured_at_ms) {
      attrs += ' data-live-sport="' + (ev._sport || '') + '"';
      attrs += ' data-live-period="' + live.period + '"';
      attrs += ' data-live-clock-initial="' + String(live.display_clock).replace(/"/g, '') + '"';
      attrs += ' data-live-captured="' + live.captured_at_ms + '"';
      attrs += ' data-live-running="' + (live.clock_running ? '1' : '0') + '"';
    }
    // Score goes into its own attribute so the tick loop can rebuild
    // the full text (LIVE · SCORE · CLOCK) without erasing it.
    if (scoreStr) {
      attrs += ' data-live-score="' + scoreStr.replace(/"/g, '') + '"';
    }
    return '<span class="live-badge"' + attrs + '><span class="live-dot"></span><span class="live-text">LIVE' + scorePart + clockPart + '</span></span>';
  }
  var dt = buildDateText(ev);
  return dt ? '<span class="card-date">' + dt + '</span>' : '';
}

// Parse a clock string to total seconds. Handles "8:47" (quarter/
// period clock) and "38'" or "38" (soccer minute).
function parseClockSecs(s) {
  if (!s) return null;
  s = String(s).trim();
  var m = s.match(/^(\d+):(\d{1,2})$/);
  if (m) return parseInt(m[1], 10) * 60 + parseInt(m[2], 10);
  m = s.match(/^(\d+)'?$/);
  if (m) return parseInt(m[1], 10) * 60;
  return null;
}

function formatMMSS(secs) {
  if (secs < 0) secs = 0;
  var m = Math.floor(secs / 60);
  var s = secs % 60;
  return m + ':' + (s < 10 ? '0' + s : s);
}

function buildLiveLabel(sport, period, clockSecs) {
  if (sport === 'Soccer') {
    var mins = Math.floor(clockSecs / 60);
    var tick = mins + "'";
    if (period === 1) return '1st ' + tick;
    if (period === 2) return '2nd ' + tick;
    return tick;
  }
  var clockStr = formatMMSS(clockSecs);
  if (sport === 'Hockey') return 'P' + period + ' ' + clockStr;
  if (sport === 'Basketball' || sport === 'Football') return 'Q' + period + ' ' + clockStr;
  return clockStr;
}

// 500ms tick loop: re-interpolate the clock on every visible live
// badge so Q2 8:47 → Q2 8:46.5 → Q2 8:46 without waiting for the next
// backend refresh. Count-down for NBA/NFL/NHL, count-up for soccer.
function tickLiveClocks() {
  var badges = document.querySelectorAll('.live-badge[data-live-sport]');
  if (!badges.length) return;
  var now = Date.now();
  for (var i = 0; i < badges.length; i++) {
    var badge = badges[i];
    var running = badge.getAttribute('data-live-running') !== '0';
    if (!running) continue;  // paused play — leave whatever text renderTimeSlot wrote
    var sport = badge.getAttribute('data-live-sport');
    var period = parseInt(badge.getAttribute('data-live-period') || '0', 10);
    var initial = badge.getAttribute('data-live-clock-initial');
    var captured = parseInt(badge.getAttribute('data-live-captured') || '0', 10);
    if (!initial || !captured) continue;
    var baseSecs = parseClockSecs(initial);
    if (baseSecs === null) continue;
    var elapsed = Math.max(0, Math.floor((now - captured) / 1000));
    // Cap drift so a stale capture doesn't run the clock to zero.
    if (elapsed > 15) elapsed = 15;
    var newSecs;
    if (sport === 'Soccer') {
      newSecs = baseSecs + elapsed;
    } else {
      newSecs = Math.max(0, baseSecs - elapsed);
    }
    var label = buildLiveLabel(sport, period, newSecs);
    var text = badge.querySelector('.live-text');
    if (text) {
      var score = badge.getAttribute('data-live-score') || '';
      var scorePart = score ? ' \u00B7 ' + score : '';
      var full = 'LIVE' + scorePart + ' \u00B7 ' + label;
      if (text.textContent !== full) text.textContent = full;
    }
  }
}
setInterval(tickLiveClocks, 500);

// Render a 2-row tennis scoreboard (player per row, sets +
// current games + current points) when _live_state.tennis is
// present. Returns empty string for non-tennis cards.
function buildTennisScore(ev) {
  if (!ev || !ev._live_state) return "";
  var t = ev._live_state.tennis;
  if (!t) return "";
  var r1Name = t.row1_name || "";
  var r2Name = t.row2_name || "";
  if (!r1Name || !r2Name) return "";
  function esc(s) {
    return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  function renderRow(which) {
    var name = which === 1 ? r1Name : r2Name;
    var sets = which === 1 ? t.row1_sets : t.row2_sets;
    var games = which === 1 ? t.row1_games : t.row2_games;
    var point = which === 1 ? t.row1_point : t.row2_point;
    var server = t.server === ("row" + which);
    var hist = t.set_history || [];
    var html = '<div class="tennis-row">';
    html += '<span class="tn-name">' + esc(name);
    if (sets !== "" && sets !== undefined && sets !== null) {
      html += ' <span class="tn-sets">' + esc(sets) + '</span>';
    }
    html += '</span>';
    html += '<span class="tn-serve">' + (server ? "\u25CF" : "") + '</span>';
    // Show set history for completed sets (all but the last), each
    // as a small muted box.
    if (hist.length > 1) {
      html += '<div class="tn-history">';
      for (var i = 0; i < hist.length - 1; i++) {
        var val = which === 1 ? hist[i].row1 : hist[i].row2;
        if (val !== undefined && val !== null) {
          html += '<div class="tn-box">' + esc(val) + '</div>';
        }
      }
      html += '</div>';
    }
    // Current set games box
    if (games !== "" && games !== undefined && games !== null) {
      html += '<div class="tn-box">' + esc(games) + '</div>';
    }
    // Current game points box (only shown when populated)
    if (point !== "" && point !== undefined && point !== null) {
      html += '<div class="tn-box">' + esc(point) + '</div>';
    }
    html += '</div>';
    return html;
  }
  return '<div class="tennis-score">' + renderRow(1) + renderRow(2) + '</div>';
}

// Build a map of lowercase team-keyword → score from _live_state,
// used to show scores next to outcome labels on moneyline cards.
function buildScoreMap(ev) {
  if (!ev || !ev._live_state) return null;
  var ls = ev._live_state;
  var hs = ls.home_score, as_ = ls.away_score;
  // ESPN omits scores for some 0-0 games; default to "0" when live
  if (ls.state === "in") { hs = hs || "0"; as_ = as_ || "0"; }
  if (hs === "" || hs === undefined || as_ === "" || as_ === undefined) return null;
  if (ls.state !== "in" && ls.state !== "post") return null;
  // Build arrays of lowercase keywords for each side — abbreviation
  // + each word of the display name (e.g. ["mnc","manchester","city"])
  function keywords(abbr, display) {
    var kw = [];
    if (abbr) kw.push(stripAccents(abbr));
    if (display) {
      var words = stripAccents(display).split(/\s+/);
      for (var i = 0; i < words.length; i++) {
        if (words[i].length >= 3) kw.push(words[i]);
      }
    }
    return kw;
  }
  // Merge ESPN keywords + Kalshi title keywords so outcome labels
  // match even when Kalshi uses a different name than ESPN
  // (e.g. "Junin" in Kalshi vs "Sarmiento" in ESPN).
  var hk = keywords(ls.home_abbr, ls.home_display);
  var ak = keywords(ls.away_abbr, ls.away_display);
  if (ls.title_home) hk = hk.concat(keywords("", ls.title_home));
  if (ls.title_away) ak = ak.concat(keywords("", ls.title_away));
  return {
    home: { score: String(hs), keys: hk },
    away: { score: String(as_), keys: ak }
  };
}
// Strip accents/diacritics for fuzzy team name matching
// ("Tucumán" → "tucuman", "Grêmio" → "gremio")
function stripAccents(s) {
  return s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
}
function matchScore(label, scoreMap) {
  if (!scoreMap) return "";
  var ll = stripAccents(label);
  // Sum total length of all matching keywords per side. The side with
  // the higher total wins. This handles shared words like "united":
  //   "Leeds United" → home["mun":0,"manchester":0,"united":6]=6
  //                   → away["lee":3,"leeds":5,"united":6]=14 → away wins
  var sides = [scoreMap.home, scoreMap.away];
  var totals = [0, 0];
  for (var s = 0; s < sides.length; s++) {
    var keys = sides[s].keys;
    for (var k = 0; k < keys.length; k++) {
      var kw = stripAccents(keys[k]);
      if (ll.indexOf(kw) >= 0) totals[s] += kw.length;
    }
  }
  if (totals[0] === 0 && totals[1] === 0) return "";
  if (totals[0] > totals[1]) return sides[0].score;
  if (totals[1] > totals[0]) return sides[1].score;
  return ""; // true tie
}

// Render one outcome table (header row + outcome rows + optional
// expand button). Shared by both the flat single-market card and
// each market_group tab inside a multi-market card.
function buildOutcomeTable(outcomes, groupCode, scoreMap) {
  var h = "";
  var total = outcomes.length;
  if (total === 0) return h;
  h += "<div class=\"outcome-header\">";
  h += "<div class=\"outcome-label\"></div>";
  if (scoreMap) h += "<div class=\"header-score\">Score</div>";
  h += "<div class=\"header-chance\">Probability</div>";
  h += "<div class=\"header-odds\">";
  h += "<div class=\"header-odds-box header-yes\">Yes</div>";
  h += "<div class=\"header-odds-box header-no\">No</div>";
  h += "</div>";
  h += "</div>";
  // Rows beyond the first 5 get "outcome-row-extra" so they're
  // hidden until the "Show all N outcomes" button is clicked.
  for (var i = 0; i < total; i++) {
    var o = outcomes[i];
    var extraClass = i >= 5 ? " outcome-row-extra" : "";
    h += "<div class=\"outcome-row" + extraClass + "\"";
    h += " data-card-ticker=\"" + (o.ticker || "") + "\"";
    if (groupCode) h += " data-group=\"" + groupCode + "\"";
    h += ">";
    h += "<div class=\"outcome-label\">" + o.label + "</div>";
    if (scoreMap) {
      var sc = matchScore(o.label, scoreMap);
      h += "<div class=\"outcome-score\">" + sc + "</div>";
    }
    h += "<div class=\"outcome-chance\">" + o.chance + "</div>";
    h += "<div class=\"outcome-odds\">";
    h += "<div class=\"odds-box odds-yes\">" + o.yes + "</div>";
    h += "<div class=\"odds-box odds-no\">" + o.no + "</div>";
    h += "</div></div>";
  }
  if (total > 5) {
    var hidden = total - 5;
    h += '<button class="outcome-expand-btn" data-total="' + total + '" onclick="window.toggleCardOutcomes(this)">';
    h += "Show all " + total + " outcomes (" + hidden + " more)";
    h += "</button>";
  }
  return h;
}

function buildCard(ev) {
  var sport = ev._sport || "";
  var cat = ev.category || "Other";
  var icon = sport ? (SPORT_EMOJI[sport] || CAT_EMOJI[cat] || "") : (CAT_EMOJI[cat] || "");
  var label = sport || cat;
  var ticker = ev.event_ticker || "";
  var series = ev.series_ticker || "";
  var url = series ? "https://kalshi.com/markets/" + series.toLowerCase() + "/" + series.toLowerCase().replace("kx", "") + "/" + ticker.toLowerCase() : "";
  var outcomes = ev.outcomes || [];
  // When the backend has collapsed sibling game markets (La Liga
  // spread / total / BTTS / 1H) under the moneyline parent, render
  // the card with a tab strip. Otherwise render a normal flat
  // outcome table.
  var groups = ev.market_groups || null;
  var hasGroups = Array.isArray(groups) && groups.length > 1;

  var h = "<div class=\"market-card\" data-event-ticker=\"" + (ticker || "") + "\">";
  var subcat = ev._subcat || "";
  // Row 1: icon + category + subcategory
  h += "<div style=\"display:flex;gap:6px;align-items:center;flex-wrap:wrap\">";
  if (icon) h += "<span class=\"cat-icon\">" + icon + "</span>";
  h += "<span class=\"cat-pill\">" + label + "</span>";
  if (subcat) h += "<span class=\"sub-pill\">" + subcat + "</span>";
  h += "</div>";
  // Row 2: event title
  h += "<div class=\"card-title\">" + ev.title + "</div>";
  // Row 3: live badge / date + ticker link
  var timeSlot = renderTimeSlot(ev);
  if (timeSlot) h += "<div class=\"card-live-row\">" + timeSlot + "</div>";
  // Playoff / 2-leg series pill — rendered below the live badge on
  // the card so the user sees "AGG 3-2 · Leg 2/2" at a glance.
  var seriesPill = renderSeriesPill(ev);
  if (seriesPill) h += '<div class="card-series-row">' + seriesPill + '</div>';
  h += "<div class=\"card-ticker\">";
  if (url) h += "<a href=\"" + url + "\" target=\"_blank\">" + ticker + "</a>";
  else h += "<span>" + ticker + "</span>";
  h += "</div>";
  // Tennis scoreboard (2 rows per player) when available.
  h += buildTennisScore(ev);
  // Score map for showing live scores next to team names in
  // moneyline outcome rows.
  var scoreMap = buildScoreMap(ev);

  if (hasGroups) {
    // Tab strip. First group is active by default (backend orders
    // them moneyline → spread → total → BTTS → 1H). Each tab
    // carries the sibling's own event_ticker + URL so clicking it
    // updates the card-ticker link to point at Kalshi's page for
    // the market type now being shown.
    h += '<div class="market-tabs">';
    for (var t = 0; t < groups.length; t++) {
      var g = groups[t];
      var activeCls = t === 0 ? " active" : "";
      h += '<button class="market-tab' + activeCls + '"'
         + ' data-group="' + g.type_code + '"'
         + ' data-ticker="' + (g.event_ticker || "") + '"'
         + ' data-url="' + (g.url || "") + '"'
         + ' onclick="window.switchMarketTab(this)">';
      h += g.label;
      h += "</button>";
    }
    h += "</div>";
    // Render each group's table inside its own wrapper so CSS can
    // hide inactive ones. All outcomes stay in the DOM so live
    // refresh updates every tab even when it's not visible.
    for (var t2 = 0; t2 < groups.length; t2++) {
      var g2 = groups[t2];
      var activeCls2 = t2 === 0 ? " active" : "";
      h += '<div class="market-group' + activeCls2 + '" data-group="' + g2.type_code + '">';
      // Only show scores on the moneyline (Winner) tab
      var gScore = (t2 === 0) ? scoreMap : null;
      h += buildOutcomeTable(g2.outcomes || [], g2.type_code, gScore);
      h += "</div>";
    }
  } else {
    h += buildOutcomeTable(outcomes, "", scoreMap);
  }
  h += "</div>";
  return h;
}

// Tab click handler: toggle .active on both the clicked tab and
// its matching .market-group panel within the same card, and
// swap the card-ticker link/text to point at the active tab's
// own Kalshi event page so users can jump straight to the right
// market type (winner / spread / totals) on Kalshi.
window.switchMarketTab = function(btn) {
  var card = btn.closest(".market-card");
  if (!card) return;
  var code = btn.getAttribute("data-group");
  if (!code) return;
  var tabs = card.querySelectorAll(".market-tab");
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.toggle("active", tabs[i].getAttribute("data-group") === code);
  }
  var panels = card.querySelectorAll(".market-group");
  for (var j = 0; j < panels.length; j++) {
    panels[j].classList.toggle("active", panels[j].getAttribute("data-group") === code);
  }
  // Update the card-ticker reference so the visible ticker +
  // href match whichever tab is active. Falls back silently if
  // the sibling didn't publish a URL.
  var newTicker = btn.getAttribute("data-ticker") || "";
  var newUrl    = btn.getAttribute("data-url") || "";
  var tickerBox = card.querySelector(".card-ticker");
  if (tickerBox && newTicker) {
    var a = tickerBox.querySelector("a");
    if (a) {
      if (newUrl) a.setAttribute("href", newUrl);
      a.textContent = newTicker;
    } else {
      var span = tickerBox.querySelector("span");
      if (span) span.textContent = newTicker;
    }
  }
};

// Toggle expanded state on a card and update the button label.
// Called inline from the "Show all N outcomes" button.
window.toggleCardOutcomes = function(btn) {
  var card = btn.closest(".market-card");
  if (!card) return;
  var total = parseInt(btn.getAttribute("data-total") || "0", 10);
  var hidden = Math.max(0, total - 5);
  var expanded = card.classList.toggle("expanded");
  btn.textContent = expanded
    ? "Show less"
    : ("Show all " + total + " outcomes (" + hidden + " more)");
};

// Live refresh: every 5s, re-fetch the currently visible cards and
// update their odds numbers in place. Backend overlays WebSocket
// prices on top of the REST snapshot, so the numbers are near real
// time without rebuilding the full DOM.
function _parseNum(s) {
  var m = String(s || "").match(/(-?\d+(?:\.\d+)?)/);
  return m ? parseFloat(m[1]) : null;
}
function _flash(el, oldVal, newVal) {
  if (!el) return;
  var a = _parseNum(oldVal), b = _parseNum(newVal);
  if (a === null || b === null || a === b) return;
  var cls = b > a ? "flash-up" : "flash-down";
  el.classList.remove("flash-up", "flash-down");
  // Force reflow so the animation restarts if it was just applied.
  void el.offsetWidth;
  el.classList.add(cls);
}
function _updateIfChanged(el, flashTarget, newVal) {
  if (!el) return;
  var old = el.textContent;
  if (old === newVal) return;
  _flash(flashTarget || el, old, newVal);
  el.textContent = newVal;
}
async function refreshVisible() {
  if (state.category === null || state.loading || state.offset === 0) return;
  // Don't refresh the (hidden) cards grid while the event-detail
  // page is showing — saves bandwidth and keeps the grid stable
  // underneath.
  if (state._eventTicker) return;
  var url = "/api/events?offset=0&limit=" + state.offset + "&date_filter=" + state.dateFilter + "&sort=" + state.sort;
  if (state.dateFilter === "custom" && state.dateFrom) url += "&date_from=" + state.dateFrom;
  if (state.dateFilter === "custom" && state.dateTo) url += "&date_to=" + state.dateTo;
  if (state.category && state.category !== "All") url += "&category=" + encodeURIComponent(state.category);
  if (state.sport) url += "&sport=" + encodeURIComponent(state.sport);
  if (state.soccerComp) url += "&soccer_comp=" + encodeURIComponent(state.soccerComp);
  if (state._liveCat) url += "&live_cat=" + encodeURIComponent(state._liveCat);
  if (state.viewMode === "all") url += "&view=all";
  if (state.search) url += "&search=" + encodeURIComponent(state.search);
  try {
    var r = await fetch(url);
    var d = await r.json();
    var evs = d.events || [];
    var grid = document.getElementById("cards-grid");
    for (var i = 0; i < evs.length; i++) {
      var ev = evs[i];
      var sel = '[data-event-ticker="' + (ev.event_ticker || "").replace(/"/g, '\\"') + '"]';
      var card = grid.querySelector(sel);
      if (!card) continue;
      // Keep the LIVE badge / date in sync so games that cross kickoff
      // while the tab is open flip to live automatically.
      var slot = card.querySelector(".card-live-row");
      if (slot) {
        var fresh = renderTimeSlot(ev);
        if (slot.innerHTML !== fresh) slot.innerHTML = fresh;
      }
      // Series/aggregate pill — update in place so newly resolved
      // aggregate data surfaces without a full card rebuild.
      var seriesEl = card.querySelector(".card-series-row");
      var freshSeries = renderSeriesPill(ev);
      if (seriesEl && freshSeries) {
        if (seriesEl.innerHTML !== freshSeries) seriesEl.innerHTML = freshSeries;
      } else if (!seriesEl && freshSeries) {
        var anchor = card.querySelector(".card-live-row") || card.querySelector(".card-ticker");
        if (anchor) {
          var d = document.createElement("div");
          d.className = "card-series-row";
          d.innerHTML = freshSeries;
          anchor.parentNode.insertBefore(d, anchor.nextSibling);
        }
      } else if (seriesEl && !freshSeries) {
        seriesEl.parentNode.removeChild(seriesEl);
      }
      // Tennis scoreboard (if present) — update in place from the
      // freshly fetched _live_state so live score changes flow in
      // without rebuilding the whole card.
      var tscore = card.querySelector(".tennis-score");
      var freshTennis = buildTennisScore(ev);
      if (tscore && freshTennis) {
        if (tscore.outerHTML !== freshTennis) {
          tscore.outerHTML = freshTennis;
        }
      } else if (!tscore && freshTennis) {
        // Card didn't have a tennis block before (tennis match just
        // went live) — insert it before outcome-header.
        var anchor = card.querySelector(".outcome-header") || card.querySelector(".outcome-row");
        if (anchor) {
          var tmp = document.createElement("div");
          tmp.innerHTML = freshTennis;
          if (tmp.firstChild) anchor.parentNode.insertBefore(tmp.firstChild, anchor);
        }
      } else if (tscore && !freshTennis) {
        tscore.parentNode.removeChild(tscore);
      }
      // Rebuild scoreMap from fresh _live_state so score column
      // updates when goals are scored (not just on full page load).
      var freshScoreMap = buildScoreMap(ev);
      // Multi-market cards (tabbed La Liga game cards) carry their
      // outcomes under ev.market_groups[]. Each panel in the DOM
      // has data-group=<type_code> matching one of the groups, so
      // we update per-panel. Single-market cards fall through to
      // the flat ev.outcomes list and pick up rows by index.
      var groups = ev.market_groups;
      if (Array.isArray(groups) && groups.length > 1) {
        for (var gi = 0; gi < groups.length; gi++) {
          var gr = groups[gi];
          var code = gr.type_code || "";
          if (!code) continue;
          var panel = card.querySelector('.market-group[data-group="' + code + '"]');
          if (!panel) continue;
          var grows = panel.querySelectorAll(".outcome-row");
          var gouts = gr.outcomes || [];
          for (var gj = 0; gj < grows.length && gj < gouts.length; gj++) {
            var grow = grows[gj];
            var go = gouts[gj];
            var gScoreEl = grow.querySelector(".outcome-score");
            if (gScoreEl && freshScoreMap) gScoreEl.textContent = matchScore(go.label, freshScoreMap);
            var gChance = grow.querySelector(".outcome-chance");
            _updateIfChanged(gChance, gChance, go.chance);
            var gBoxes = grow.querySelectorAll(".odds-box");
            _updateIfChanged(gBoxes[0], gBoxes[0], go.yes);
            _updateIfChanged(gBoxes[1], gBoxes[1], go.no);
          }
        }
      } else {
        var rows = card.querySelectorAll(".outcome-row");
        var outs = ev.outcomes || [];
        for (var j = 0; j < rows.length && j < outs.length; j++) {
          var row = rows[j];
          var o = outs[j];
          var scoreEl = row.querySelector(".outcome-score");
          if (scoreEl && freshScoreMap) scoreEl.textContent = matchScore(o.label, freshScoreMap);
          var chanceEl = row.querySelector(".outcome-chance");
          _updateIfChanged(chanceEl, chanceEl, o.chance);
          var boxes = row.querySelectorAll(".odds-box");
          _updateIfChanged(boxes[0], boxes[0], o.yes);
          _updateIfChanged(boxes[1], boxes[1], o.no);
        }
      }
    }
  } catch (e) { /* swallow: next tick will try again */ }
}

function showEventDetail(ticker, skipHistory) {

  // screen. Only stash if we're entering the detail view from

      ed.innerHTML = renderEventDetail(d.event);
      // Subscribe to live price updates for every market shown on

      try {
        var subTickers = [];
        var gs = d.event.market_groups;
        if (Array.isArray(gs) && gs.length > 1) {
          for (var gi = 0; gi < gs.length; gi++) {

        setTimeout(function() {

// "How this settles" — expandable panel showing each outcome's
// settlement rule plus the shared event-level context. Rules come
// straight from Kalshi (rules_primary, rules_secondary, and
// early_close_condition) so users see exactly what conditions
// resolve each market. Returns "" when no outcomes carry rules.
function renderSettlementRules(markets) {
  if (!markets || !markets.length) return "";
  var anyRules = false;
  for (var i = 0; i < markets.length; i++) {
    if (markets[i] && (markets[i].rules || markets[i].rules_secondary)) {
      anyRules = true; break;
    }
  }
  if (!anyRules) return "";
  // Event-level context: rules_secondary + early_close_condition
  // are usually identical across every outcome of a given event
  // (they describe the event, not the specific YES outcome), so
  // we pull them once from the first market that has them.
  var eventContext = "";
  var earlyClose = "";
  for (var j = 0; j < markets.length; j++) {
    if (markets[j].rules_secondary && !eventContext) {
      eventContext = markets[j].rules_secondary;
    }
    if (markets[j].early_close_condition && !earlyClose) {
      earlyClose = markets[j].early_close_condition;
    }
    if (eventContext && earlyClose) break;
  }
  var h = '<div class="ed-rules">';
  h += '<button class="ed-rules-toggle" onclick="window.toggleRules(this)" aria-expanded="false">';
  h += '<span class="ed-rules-title">How this settles</span>';
  h += '<span class="ed-rules-chevron">\u25BE</span>';
  h += '</button>';
  h += '<div class="ed-rules-body" hidden>';
  // Per-outcome resolution rule.
  h += '<div class="ed-rules-sub">Resolution criteria</div>';
  for (var k = 0; k < markets.length; k++) {
    var m = markets[k];
    if (!m.rules) continue;
    h += '<div class="ed-rule-item">';
    h += '<div class="ed-rule-label">' + escH(m.label) + '</div>';
    h += '<div class="ed-rule-text">' + escH(m.rules) + '</div>';
    h += '</div>';
  }
  if (eventContext) {
    h += '<div class="ed-rules-sub">Event rules</div>';
    h += '<div class="ed-rule-text">' + escH(eventContext) + '</div>';
  }
  if (earlyClose) {
    h += '<div class="ed-rules-sub">Early close</div>';
    h += '<div class="ed-rule-text">' + escH(earlyClose) + '</div>';
  }
  h += '</div></div>';
  return h;
}

window.toggleRules = function(btn) {

};


// ── Market data grid (finviz-style dense table) ────────────────
// Every Kalshi field for the event and its primary market rendered
// as label:value pairs in a tight grid. Lives below "How this
// settles" on the event detail page.
//
// Data arrives async via /api/kalshi_event_raw which already
// returns event_top_level_only (every event field) and
// sample_active_market (every market field) — we just lay them
// out in a dense grid for at-a-glance inspection.

// Field catalog organized in COLUMNS that match the user's
// spreadsheet layout. Each inner array is one vertical column;
// the renderer interleaves them into rows of 4 pairs (like
// finviz reads: row1 = col1[0], col2[0], col3[0], col4[0]).
// Field groups matching the user's spreadsheet. Each group has a
// display name (headline) and an array of [label, kalshi_key,
// source] entries. source is "event" (shared across outcomes) or
// "market" (per-outcome, shown in comparison columns).
var DATA_FIELD_GROUPS = [

  ]},

    ["Result",                "result",                  "market"],
    ["Market Type",           "market_type",             "market"],
  ]},
  { name: "Settlement & Rules", fields: [

    ["Early Close Condition", "early_close_condition",   "market"],
