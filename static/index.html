function formatEDDate(iso) {
  if (!iso) return "";
  try {
    var d = new Date(iso);
    return d.toLocaleDateString("en-US", {
      month: "short", day: "numeric", year: "numeric",
      hour: "numeric", minute: "2-digit", timeZone: "America/New_York",
      timeZoneName: "short"
    });
  } catch (e) { return iso; }
}

function fmtNum(n) {
  if (n === null || n === undefined) return "—";
  if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, "") + "M";
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, "") + "k";
  return String(Math.round(n));
}

function fmtMoney(n) {
  if (n === null || n === undefined) return "—";
  if (n >= 1000000) return "$" + (n / 1000000).toFixed(2).replace(/\.?0+$/, "") + "M";
  if (n >= 10000) return "$" + (n / 1000).toFixed(1).replace(/\.0$/, "") + "k";
  return "$" + Math.round(n).toLocaleString();
}

function escH(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// "How this settles" — expandable panel showing each outcome's
// settlement rule plus the shared event-level context. Rules come
// straight from Kalshi (rules_primary, rules_secondary, and
// early_close_condition) so users see exactly what conditions
// resolve each market. Returns "" when no outcomes carry rules.
function renderSettlementRules(markets) {
  if (!markets || !markets.length) return "";
  var anyRules = false;
  for (var i = 0; i < markets.length; i++) {
    if (markets[i] && (markets[i].rules || markets[i].rules_secondary)) {
      anyRules = true; break;
    }
  }
  if (!anyRules) return "";
  // Event-level context: rules_secondary + early_close_condition
  // are usually identical across every outcome of a given event
  // (they describe the event, not the specific YES outcome), so
  // we pull them once from the first market that has them.
  var eventContext = "";
  var earlyClose = "";
  for (var j = 0; j < markets.length; j++) {
    if (markets[j].rules_secondary && !eventContext) {
      eventContext = markets[j].rules_secondary;
    }
    if (markets[j].early_close_condition && !earlyClose) {
      earlyClose = markets[j].early_close_condition;
    }
    if (eventContext && earlyClose) break;
  }
  var h = '<div class="ed-rules">';
  h += '<button class="ed-rules-toggle" onclick="window.toggleRules(this)" aria-expanded="false">';
  h += '<span class="ed-rules-title">How this settles</span>';
  h += '<span class="ed-rules-chevron">\u25BE</span>';
  h += '</button>';
  h += '<div class="ed-rules-body" hidden>';
  // Per-outcome resolution rule.
  h += '<div class="ed-rules-sub">Resolution criteria</div>';
  for (var k = 0; k < markets.length; k++) {
    var m = markets[k];
    if (!m.rules) continue;
    h += '<div class="ed-rule-item">';
    h += '<div class="ed-rule-label">' + escH(m.label) + '</div>';
    h += '<div class="ed-rule-text">' + escH(m.rules) + '</div>';
    h += '</div>';
  }
  if (eventContext) {
    h += '<div class="ed-rules-sub">Event rules</div>';
    h += '<div class="ed-rule-text">' + escH(eventContext) + '</div>';
  }
  if (earlyClose) {
    h += '<div class="ed-rules-sub">Early close</div>';
    h += '<div class="ed-rule-text">' + escH(earlyClose) + '</div>';
  }
  h += '</div></div>';
  return h;
}

window.toggleRules = function(btn) {
  var body = btn.nextElementSibling;
  if (!body) return;
  var open = body.hidden;
  body.hidden = !open;
  btn.setAttribute("aria-expanded", open ? "true" : "false");
  btn.classList.toggle("open", open);
};

// Map market_ticker → human-readable label for chart legend use.
function _outcomeLabels(outcomes) {
  var m = {};
  for (var i = 0; i < outcomes.length; i++) {
    if (outcomes[i] && outcomes[i].ticker) {
      m[outcomes[i].ticker] = outcomes[i].label || outcomes[i].ticker;
    }
  }
  return m;
}

// Color palette for price-history chart lines. Matches the
// category pill greens + adds contrasting hues so up to ~6
// overlaid outcomes are visually distinguishable.
var CHART_COLORS = [
  "#4caf50", "#f44336", "#ffd54f", "#4fc3f7",
  "#ba68c8", "#ff8a65", "#81c784", "#e57373",
];

// Build a single SVG with all market lines overlaid. Y axis is
// 0-100% (probability), X axis is 0 to full window width. Returns
// "" when no series has data.
function renderPriceChartSvg(series) {
  if (!series || !series.length) return "";
  // Determine global time bounds so every line shares an X scale.
  var tMin = Infinity, tMax = -Infinity;
  for (var i = 0; i < series.length; i++) {
    var pts = series[i].points || [];
    for (var j = 0; j < pts.length; j++) {
      if (pts[j].t < tMin) tMin = pts[j].t;
      if (pts[j].t > tMax) tMax = pts[j].t;
    }
  }
  if (!isFinite(tMin) || !isFinite(tMax) || tMin === tMax) return "";
  var W = 900, H = 220;        // viewBox dimensions
  var padL = 32, padR = 8, padT = 12, padB = 22;
  var w = W - padL - padR;
  var h = H - padT - padB;
  function sx(t) { return padL + ((t - tMin) / (tMax - tMin)) * w; }
  function sy(p) { return padT + (1 - (p / 100)) * h; }
  var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" class="ed-chart-svg" preserveAspectRatio="none">';
  // Horizontal gridlines at 0, 25, 50, 75, 100%
  var grid = [0, 25, 50, 75, 100];
  for (var gi = 0; gi < grid.length; gi++) {
    var g = grid[gi];
    var y = sy(g);
    svg += '<line x1="' + padL + '" y1="' + y + '" x2="' + (padL + w) + '" y2="' + y + '" stroke="#1a1a1a" stroke-width="1"/>';
    svg += '<text x="' + (padL - 6) + '" y="' + (y + 3) + '" fill="#555" font-size="9" text-anchor="end">' + g + '%</text>';
  }
  // Lines
  for (var k = 0; k < series.length; k++) {
    var s = series[k];
    var pts2 = s.points || [];
    if (pts2.length < 2) continue;
    var d = "";
    for (var m = 0; m < pts2.length; m++) {
      d += (m === 0 ? "M" : "L") + sx(pts2[m].t).toFixed(1) + " " + sy(pts2[m].p).toFixed(1) + " ";
    }
    var color = CHART_COLORS[k % CHART_COLORS.length];
    svg += '<path d="' + d + '" fill="none" stroke="' + color + '" stroke-width="2" stroke-linejoin="round"/>';
  }
  // X-axis tick labels: first (oldest) and last (now)
  var firstDate = new Date(tMin);
  var lastDate  = new Date(tMax);
  function hm(d) {
    var hh = d.getHours();
    var mm = d.getMinutes();
    return (hh < 10 ? "0" + hh : hh) + ":" + (mm < 10 ? "0" + mm : mm);
  }
  svg += '<text x="' + padL + '" y="' + (H - 6) + '" fill="#666" font-size="10">' + hm(firstDate) + '</text>';
  svg += '<text x="' + (padL + w) + '" y="' + (H - 6) + '" fill="#666" font-size="10" text-anchor="end">' + hm(lastDate) + '</text>';
  svg += '</svg>';
  return svg;
}

// Build the chart section shown above the markets table.
// Includes placeholder while the /api/event/{ticker}/prices fetch
// is in flight, then replaces itself with the rendered chart +
// legend once data arrives.
function renderPriceHistoryPanel(evTicker, outcomeLabels) {
  return '<div class="ed-chart" data-ticker="' + escH(evTicker) + '"'
       + ' data-labels="' + escH(JSON.stringify(outcomeLabels)) + '">'
       + '<div class="ed-chart-header">'
       +   '<div class="ed-section-title" style="margin:0">Price history · 24h</div>'
       + '</div>'
       + '<div class="ed-chart-body"><div class="ed-chart-loading">Loading…</div></div>'
       + '</div>';
}

// Fetch + populate every .ed-chart placeholder currently in the DOM.
// Called after the detail page renders so the chart appears after
// a brief loading state without blocking the rest of the page.
async function hydratePriceCharts() {
  var placeholders = document.querySelectorAll(".ed-chart");
  for (var i = 0; i < placeholders.length; i++) {
    var el = placeholders[i];
    if (el.dataset.hydrated) continue;
    el.dataset.hydrated = "1";
    var tkr = el.getAttribute("data-ticker");
    var labels = {};
    try { labels = JSON.parse(el.getAttribute("data-labels") || "{}"); } catch (e) {}
    try {
      var r = await fetch("/api/event/" + encodeURIComponent(tkr) + "/prices?hours=24");
      var d = await r.json();
      var series = d.series || [];
      // Attach labels to each series for the legend.
      for (var j = 0; j < series.length; j++) {
        series[j].label = labels[series[j].market_ticker] || series[j].market_ticker;
      }
      var body = el.querySelector(".ed-chart-body");
      if (!series.length) {
        body.innerHTML = '<div class="ed-chart-empty">No price history recorded yet for this event. Data starts accumulating as soon as the market is tracked — check back shortly.</div>';
        continue;
      }
      var svg = renderPriceChartSvg(series);
      if (!svg) {
        body.innerHTML = '<div class="ed-chart-empty">Not enough data points yet.</div>';
        continue;
      }
      var legend = '<div class="ed-chart-legend">';
      for (var s = 0; s < series.length; s++) {
        var color = CHART_COLORS[s % CHART_COLORS.length];
        var curr = series[s].last;
        var delta = (series[s].last - series[s].first);
        var deltaText = (delta >= 0 ? "+" : "") + delta.toFixed(0) + "¢";
        var deltaCls = delta >= 0 ? "up" : "down";
        legend += '<div class="ed-chart-legend-item">';
        legend += '<span class="ed-chart-swatch" style="background:' + color + '"></span>';
        legend += '<span class="ed-chart-legend-label">' + escH(series[s].label) + '</span>';
        legend += '<span class="ed-chart-legend-val">' + curr.toFixed(0) + '¢</span>';
        legend += '<span class="ed-chart-legend-delta ' + deltaCls + '">' + deltaText + '</span>';
        legend += '</div>';
      }
      legend += '</div>';
      body.innerHTML = svg + legend;
    } catch (ex) {
      var body2 = el.querySelector(".ed-chart-body");
      if (body2) body2.innerHTML = '<div class="ed-chart-empty">Failed to load price history.</div>';
      console.error("hydratePriceCharts error", ex);
    }
  }
}

function renderMarketsTable(markets, liveBadge) {
  if (!markets || !markets.length) {
    return '<div style="color:var(--text-muted);padding:20px;text-align:center">No markets.</div>';
  }
  var h = '<table class="ed-markets-table"><thead><tr>';
  h += '<th>Outcome</th>';
  h += '<th style="text-align:center">Probability</th>';
  h += '<th style="text-align:center">Yes</th>';
  h += '<th style="text-align:center">No</th>';
  h += '<th style="text-align:center">Last</th>';
  h += '<th style="text-align:center">Spread</th>';
  h += '<th style="text-align:center">24h Vol</th>';
  h += '<th style="text-align:center">Volume</th>';
  h += '<th style="text-align:center">OI</th>';
  h += '<th style="text-align:center">Liquidity</th>';
  h += '</tr></thead><tbody>';
  for (var i = 0; i < markets.length; i++) {
    var m = markets[i];
    var liveCls = (liveBadge && i === 0) ? " ed-live-dot" : "";
    h += '<tr>';
    h += '<td class="ed-mk-label' + liveCls + '">' + escH(m.label) + '</td>';
    h += '<td class="ed-prob">' + escH(m.chance) + '</td>';
    h += '<td class="ed-yes">' + escH(m.yes) + '</td>';
    h += '<td class="ed-no">' + escH(m.no) + '</td>';
    h += '<td class="ed-num">' + (m.last_price != null ? (m.last_price + "¢") : "—") + '</td>';
    h += '<td class="ed-num">' + (m.spread != null ? (m.spread + "¢") : "—") + '</td>';
    h += '<td class="ed-num">' + fmtNum(m.volume_24h) + '</td>';
    h += '<td class="ed-num">' + fmtNum(m.volume) + '</td>';
    h += '<td class="ed-num">' + fmtNum(m.open_interest) + '</td>';
    h += '<td class="ed-num">' + fmtMoney(m.liquidity) + '</td>';
    h += '</tr>';
  }
  h += '</tbody></table>';
  return h;
}

function summaryStats(markets) {
  // Aggregate volume / OI / liquidity across every market in the
  // current group so the top-line "event level" stats give users
  // a quick read on overall activity.
  var totVol = 0, tot24 = 0, totOI = 0, totLiq = 0, nMarkets = 0;
  for (var i = 0; i < markets.length; i++) {
    var m = markets[i];
    if (m.volume != null) totVol += m.volume;
    if (m.volume_24h != null) tot24 += m.volume_24h;
    if (m.open_interest != null) totOI += m.open_interest;
    if (m.liquidity != null) totLiq += m.liquidity;
    nMarkets += 1;
  }
  var h = '<div class="ed-summary">';
  h += '<div class="ed-stat"><div class="ed-stat-label">Markets</div><div class="ed-stat-val">' + nMarkets + '</div></div>';
  h += '<div class="ed-stat"><div class="ed-stat-label">24h Volume</div><div class="ed-stat-val">' + fmtNum(tot24) + '</div></div>';
  h += '<div class="ed-stat"><div class="ed-stat-label">Total Volume</div><div class="ed-stat-val">' + fmtNum(totVol) + '</div></div>';
  h += '<div class="ed-stat"><div class="ed-stat-label">Open Interest</div><div class="ed-stat-val">' + fmtNum(totOI) + '</div></div>';
  h += '<div class="ed-stat"><div class="ed-stat-label">Liquidity</div><div class="ed-stat-val">' + fmtMoney(totLiq) + '</div></div>';
  h += '</div>';
  return h;
}

function renderEventDetail(ev) {
  var sport = ev._sport || "";
  var cat = ev.category || "Other";
  var icon = sport ? (SPORT_EMOJI[sport] || CAT_EMOJI[cat] || "") : (CAT_EMOJI[cat] || "");
  var label = sport || cat;
  var subcat = ev._subcat || "";
  var ticker = ev.event_ticker || "";
  var kalshiUrl = ev.url || "";
  var kickoff = ev._kickoff_dt || "";
  var expires = ev._exp_dt || ev._close_dt || "";
  var live = ev._live_state || null;
  var groups = ev.market_groups || null;
  var hasGroups = Array.isArray(groups) && groups.length > 1;

  // Header card: pills, title, meta, scoreboard.
  var h = '<div class="ed-header">';
  h += '<div class="ed-pills">';
  if (icon) h += '<span class="cat-icon">' + icon + '</span>';
  h += '<span class="cat-pill">' + escH(label) + '</span>';
  if (subcat) h += '<span class="sub-pill">' + escH(subcat) + '</span>';
  if (live && live.state === "in") {
    h += '<span class="live-badge"><span class="live-dot"></span>'
      + '<span class="live-text">Live' + (live.short_detail ? " · " + escH(live.short_detail) : "") + '</span></span>';
  } else if (live && live.state === "post") {
    h += '<span class="final-badge">Final</span>';
  }
  h += '</div>';
  h += '<h1 class="ed-title">' + escH(ev.title || "") + '</h1>';
  h += '<div class="ed-meta">';
  if (kickoff) h += '<span class="ed-meta-item"><span class="ed-meta-label">Starts</span><span class="ed-meta-val">' + escH(formatEDDate(kickoff)) + '</span></span>';
  if (expires) h += '<span class="ed-meta-item"><span class="ed-meta-label">Expires</span><span class="ed-meta-val">' + escH(formatEDDate(expires)) + '</span></span>';
  h += '<span class="ed-meta-item"><span class="ed-meta-label">Ticker</span><span class="ed-meta-val" style="font-family:monospace">' + escH(ticker) + '</span></span>';
  if (kalshiUrl) h += '<span class="ed-meta-item"><a href="' + escH(kalshiUrl) + '" target="_blank">View on Kalshi ↗</a></span>';
  h += '</div>';

  // Scoreboard row when a live game is matched.
  if (live && (live.home_abbr || live.away_abbr || live.home_score !== "" || live.away_score !== "")) {
    h += '<div class="ed-scoreboard">';
    h += '<div class="ed-sb-team"><div class="ed-sb-name">' + escH(live.home_display || live.home_abbr || "Home") + '</div>'
       + '<div class="ed-sb-score">' + escH(live.home_score || "0") + '</div></div>';
    h += '<div class="ed-sb-team"><div class="ed-sb-sep">vs</div>'
       + '<div class="ed-sb-clock">' + escH(live.short_detail || live.display_clock || "") + '</div></div>';
    h += '<div class="ed-sb-team"><div class="ed-sb-name">' + escH(live.away_display || live.away_abbr || "Away") + '</div>'
       + '<div class="ed-sb-score">' + escH(live.away_score || "0") + '</div></div>';
    h += '</div>';
  }

  // Two-leg knockout tie panel (soccer: Champions League, Copa
  // Libertadores, domestic cup ties). Shown when SofaScore or
  // ESPN reported aggregate scores or an explicit leg number.
  if (live && live.is_two_leg) {
    var aggH = (typeof live.aggregate_home === "number") ? live.aggregate_home : null;
    var aggA = (typeof live.aggregate_away === "number") ? live.aggregate_away : null;
    var hasAgg = aggH !== null && aggA !== null;
    var legN = live.leg_number;
    var tiebits = [];
    if (legN) tiebits.push("Leg " + legN + " of 2");
    if (live.round_name) tiebits.push(live.round_name);
    else if (live.tournament_name) tiebits.push(live.tournament_name);
    var tieHeader = tiebits.join(" · ");
    var winCode = live.aggregate_winner || "";
    h += '<div class="ed-series">';
    if (tieHeader) h += '<div class="ed-series-title">' + escH(tieHeader) + '</div>';
    if (hasAgg) {
      // "Aggregate" row: home side | center label | away side.
      // Uses the same .ed-series-row layout as the NBA panel but
      // shows aggregate goals instead of series wins (no dots,
      // since the number of legs is always exactly 2).
      var leadLabel = "Aggregate tied";
      if (winCode === "home") leadLabel = (live.home_abbr || "Home") + " leads aggregate";
      else if (winCode === "away") leadLabel = (live.away_abbr || "Away") + " leads aggregate";
      else if (aggH > aggA) leadLabel = (live.home_abbr || "Home") + " leads aggregate";
      else if (aggA > aggH) leadLabel = (live.away_abbr || "Away") + " leads aggregate";
      h += '<div class="ed-series-row">';
      h += '<div class="ed-series-team">';
      h += '<div class="ed-series-name">' + escH(live.home_display || live.home_abbr || "Home") + '</div>';
      h += '<div class="ed-series-wins">' + aggH + '</div>';
      h += '</div>';
      h += '<div class="ed-series-summary">' + escH(leadLabel) + '</div>';
      h += '<div class="ed-series-team ed-series-team-r">';
      h += '<div class="ed-series-wins">' + aggA + '</div>';
      h += '<div class="ed-series-name">' + escH(live.away_display || live.away_abbr || "Away") + '</div>';
      h += '</div>';
      h += '</div>';
      // Secondary hint line — emphasizes that this is the
      // cumulative score across both legs, not the current match.
      h += '<div class="ed-series-hint">Aggregate score across both legs</div>';
    } else if (legN === 1) {
      // We're on Leg 1 — no aggregate to show yet. Set expectations.
      h += '<div class="ed-series-summary-solo">Aggregate score will show after this leg ends.</div>';
    } else if (legN) {
      // 2nd leg (or later) but our data source hasn't returned the
      // aggregate yet. Don't make a definitive "will show later"
      // claim — the 1st leg has clearly already happened.
      h += '<div class="ed-series-summary-solo">Aggregate score from the 1st leg isn\u2019t available yet — check back shortly.</div>';
    }
    h += '</div>';
  }

  // Playoff-series panel. Only renders when ESPN tagged this game
  // as a playoff fixture — regular-season games have is_playoff=false.
  if (live && live.is_playoff) {
    var hWins = (typeof live.series_home_wins === "number") ? live.series_home_wins : null;
    var aWins = (typeof live.series_away_wins === "number") ? live.series_away_wins : null;
    var hasWins = hWins !== null && aWins !== null;
    var gameN = live.series_game_number;
    // Header line: either "Game 5 · Western Conference Finals" or
    // just the series title when game number is unknown.
    var headerBits = [];
    if (gameN) headerBits.push("Game " + gameN);
    if (live.series_title) headerBits.push(live.series_title);
    var headerLine = headerBits.join(" · ");
    h += '<div class="ed-series">';
    if (headerLine) h += '<div class="ed-series-title">' + escH(headerLine) + '</div>';
    if (hasWins) {
      // Two-team wins bar: home | total-games bubbles | away.
      // Each team shows its wins count and a row of circles (filled
      // for wins, outlined for remaining "possible" games up to 4
      // since NBA/NHL/MLB LCS/WS are best-of-7 → first to 4 wins).
      var bestOf = 7;  // safe default for NBA/NHL/MLB LCS; best-of-5
                       // series (MLB Div, NBA play-in) still render
                       // correctly — the extra outlined dots just
                       // represent unreachable games.
      var target = Math.ceil(bestOf / 2);  // 4 for best-of-7
      h += '<div class="ed-series-row">';
      h += '<div class="ed-series-team">';
      h += '<div class="ed-series-name">' + escH(live.home_display || live.home_abbr || "Home") + '</div>';
      h += '<div class="ed-series-dots">';
      for (var di = 0; di < target; di++) {
        h += '<span class="ed-sdot' + (di < hWins ? ' ed-sdot-filled' : '') + '"></span>';
      }
      h += '</div>';
      h += '<div class="ed-series-wins">' + hWins + '</div>';
      h += '</div>';
      h += '<div class="ed-series-summary">' + escH(live.series_summary || (hWins + "-" + aWins)) + '</div>';
      h += '<div class="ed-series-team ed-series-team-r">';
      h += '<div class="ed-series-wins">' + aWins + '</div>';
      h += '<div class="ed-series-dots">';
      for (var dj = 0; dj < target; dj++) {
        h += '<span class="ed-sdot' + (dj < aWins ? ' ed-sdot-filled' : '') + '"></span>';
      }
      h += '</div>';
      h += '<div class="ed-series-name">' + escH(live.away_display || live.away_abbr || "Away") + '</div>';
      h += '</div>';
      h += '</div>';
    } else if (live.series_summary) {
      h += '<div class="ed-series-summary-solo">' + escH(live.series_summary) + '</div>';
    }
    h += '</div>';
  }

  h += '</div>'; // /ed-header

  // Markets tabs (when the event has sibling market groups) or a
  // single flat table.
  if (hasGroups) {
    h += '<div class="ed-tabs">';
    for (var t = 0; t < groups.length; t++) {
      var g = groups[t];
      h += '<button class="ed-tab' + (t === 0 ? ' active' : '') + '"'
         + ' data-group="' + escH(g.type_code) + '"'
         + ' onclick="window.switchEDTab(this)">'
         + escH(g.label) + '</button>';
    }
    h += '</div>';
    for (var t2 = 0; t2 < groups.length; t2++) {
      var g2 = groups[t2];
      h += '<div class="ed-group' + (t2 === 0 ? ' active' : '') + '" data-group="' + escH(g2.type_code) + '">';
      h += '<div class="ed-section-title">Overview</div>';
      h += summaryStats(g2.outcomes || []);
      h += renderPriceHistoryPanel(g2.event_ticker || ticker, _outcomeLabels(g2.outcomes || []));
      h += '<div class="ed-section-title">Markets</div>';
      h += renderMarketsTable(g2.outcomes || [], false);
      h += renderSettlementRules(g2.outcomes || []);
      h += '</div>';
    }
  } else {
    h += '<div class="ed-section-title">Overview</div>';
    h += summaryStats(ev.outcomes || []);
    h += renderPriceHistoryPanel(ticker, _outcomeLabels(ev.outcomes || []));
    h += '<div class="ed-section-title">Markets</div>';
    h += renderMarketsTable(ev.outcomes || [], !!(live && live.state === "in"));
    h += renderSettlementRules(ev.outcomes || []);
  }

  return h;
}

window.switchEDTab = function(btn) {
  var code = btn.getAttribute("data-group");
  if (!code) return;
  var tabs = document.querySelectorAll(".ed-tab");
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.toggle("active", tabs[i].getAttribute("data-group") === code);
  }
  var panels = document.querySelectorAll(".ed-group");
  for (var j = 0; j < panels.length; j++) {
    panels[j].classList.toggle("active", panels[j].getAttribute("data-group") === code);
  }
};

window.addEventListener("popstate", function() {
  // Browser back/forward pressed. The URL is the authoritative
  // source of truth — restoreFromUrl rebuilds the view from it.
  restoreFromUrl(location.search);
});

// Measure the real #header height and set it as a CSS variable so
// sticky elements (screener sidebar/table header, nav) land flush
// against the bottom of the main app header on every breakpoint.
function syncHeaderHeight() {
  var h = document.getElementById("header");
  if (!h) return;
  var hh = h.getBoundingClientRect().height;
  if (hh > 0) document.documentElement.style.setProperty("--header-h", hh + "px");
}
window.addEventListener("load", syncHeaderHeight);
window.addEventListener("resize", syncHeaderHeight);
setTimeout(syncHeaderHeight, 100);
setTimeout(syncHeaderHeight, 500);

boot();
</script>
</body>
</html>
